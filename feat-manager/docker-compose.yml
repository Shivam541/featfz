services:
  mysql:
    image: mysql:8.4
    container_name: feat-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: feat_manager
      MYSQL_USER: feat_manager
      MYSQL_PASSWORD: feat_manager
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mysql_data:/var/lib/mysql

  migrate:
    image: migrate/migrate:v4.18.3
    profiles: ["tools"]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    entrypoint: ["migrate", "-path=/migrations", "-database", "${MIGRATE_DATABASE_URL}"]

volumes:
  mysql_data:
